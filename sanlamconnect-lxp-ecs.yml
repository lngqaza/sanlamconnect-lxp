AWSTemplateFormatVersion: '2010-09-09'
Description: SanlamConnect LXP Frontend - ECS Fargate + ALB (self-contained VPC)

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI for the LXP frontend (e.g. 684756697968.dkr.ecr.eu-west-1.amazonaws.com/sanlamconnect-lxp-frontend:latest)

  ContainerPort:
    Type: Number
    Default: 3000

  DesiredCount:
    Type: Number
    Default: 1

  Cpu:
    Type: String
    Default: '512'
    AllowedValues: ['256','512','1024','2048','4096']

  Memory:
    Type: String
    Default: '1024'
    AllowedValues: ['512','1024','2048','3072','4096','6144','8192','10240','12288','16384','30720']

Resources:
  # -------------------------
  # VPC (fixed CIDR)
  # -------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.90.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.90.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.90.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-public-b

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # -------------------------
  # Security Groups
  # -------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP to ALB
      VpcId: !Ref Vpc
