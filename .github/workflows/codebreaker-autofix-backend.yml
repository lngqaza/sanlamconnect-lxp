name: Codebreaker AutoFix (Backend + CFN) -> PR

on:
  workflow_run:
    workflows: ["Push backend image to ECR"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (default branch)
        uses: actions/checkout@v4

      - name: Codebreaker AutoFix (backend Dockerfile/start + workflow + CFN)
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json, re
          from pathlib import Path

          BACKEND_DIR = Path("apps/lxp-api")
          BACKEND_DOCKERFILE = BACKEND_DIR / "Dockerfile"
          BACKEND_DOCKERIGNORE = BACKEND_DIR / ".dockerignore"
          BACKEND_PKG = BACKEND_DIR / "package.json"
          BACKEND_INDEX = BACKEND_DIR / "index.js"

          WF_BACKEND = Path(".github/workflows/push-backend-to-ecr.yml")
          CFN_BACKEND = Path("sanlamconnect-lxp-backend-ecs.yml")

          def die(msg):
              raise SystemExit(msg)

          if not BACKEND_DIR.exists():
              die(f"❌ Backend dir not found: {BACKEND_DIR}")

          # -----------------------------
          # A) Backend Dockerfile: ensure it does NOT build apps/lxp-web
          # -----------------------------
          dockerfile_text = """FROM node:20-alpine
          WORKDIR /app

          COPY package*.json ./
          RUN npm install

          COPY . .

          ENV NODE_ENV=production
          ENV PORT=3001
          EXPOSE 3001

          CMD ["node","index.js"]
          """.replace("\n          ", "\n").lstrip()

          if (not BACKEND_DOCKERFILE.exists()) or ("apps/lxp-web" in BACKEND_DOCKERFILE.read_text(encoding="utf-8", errors="replace")):
              BACKEND_DOCKERFILE.write_text(dockerfile_text + "\n", encoding="utf-8")

          # -----------------------------
          # B) .dockerignore
          # -----------------------------
          if not BACKEND_DOCKERIGNORE.exists():
              BACKEND_DOCKERIGNORE.write_text(
                  "node_modules\n.next\ndist\nbuild\ncoverage\n.git\n.github\n.env\n.env.*\n",
                  encoding="utf-8"
              )

          # -----------------------------
          # C) package.json: ensure scripts.start exists
          # -----------------------------
          if not BACKEND_PKG.exists():
              die(f"❌ Missing backend package.json: {BACKEND_PKG}")

          data = json.loads(BACKEND_PKG.read_text(encoding="utf-8"))
          scripts = data.get("scripts") or {}
          if "start" not in scripts:
              scripts["start"] = "node index.js"
          data["scripts"] = scripts
          BACKEND_PKG.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")

          # -----------------------------
          # D) index.js: ensure exists (Fastify + /health)
          # -----------------------------
          if not BACKEND_INDEX.exists():
              BACKEND_INDEX.write_text(
                  """require("dotenv").config();
          const fastify = require("fastify")({ logger: true });

          fastify.get("/health", async () => ({ status: "ok" }));
          fastify.get("/", async () => ({ service: "lxp-api", status: "running" }));

          const port = Number(process.env.PORT || 3001);
          fastify.listen({ port, host: "0.0.0.0" })
            .then(() => fastify.log.info(`✅ lxp-api listening on 0.0.0.0:${port}`))
            .catch(err => { fastify.log.error(err); process.exit(1); });
          """.replace("\n          ", "\n").lstrip() + "\n",
                  encoding="utf-8"
              )

          # -----------------------------
          # E) Backend push workflow: remove accidental lxp-web references if present
          # -----------------------------
          if WF_BACKEND.exists():
              txt = WF_BACKEND.read_text(encoding="utf-8", errors="replace")
              if "apps/lxp-web" in txt:
                  WF_BACKEND.write_text(txt.replace("apps/lxp-web", "apps/lxp-api"), encoding="utf-8")

          # -----------------------------
          # F) CFN fix: HealthCheckPath=/health and inject PORT env var into lxp-backend container
          # -----------------------------
          if CFN_BACKEND.exists():
              y = CFN_BACKEND.read_text(encoding="utf-8", errors="replace").splitlines()

              # HealthCheckPath -> /health (best-effort replace)
              y2 = []
              for line in y:
                  if re.match(r"^\s*HealthCheckPath:\s*", line):
                      indent = re.match(r"^(\s*)", line).group(1)
                      y2.append(f"{indent}HealthCheckPath: /health")
                  else:
                      y2.append(line)
              y = y2

              # Insert Environment: PORT under container "- Name: lxp-backend" if missing
              # We do a light YAML-aware insertion by indentation
              start = None
              for i, line in enumerate(y):
                  if re.match(r"^\s*-\s+Name:\s*lxp-backend\s*$", line):
                      start = i
                      break

              if start is not None:
                  base_indent = len(re.match(r"^(\s*)", y[start]).group(1))
                  prop_indent = " " * (base_indent + 2)

                  # end block
                  end = len(y)
                  for j in range(start + 1, len(y)):
                      if re.match(r"^\s*-\s+Name:\s*", y[j]) and len(re.match(r"^(\s*)", y[j]).group(1)) == base_indent:
                          end = j
                          break

                  block = y[start:end]
                  has_env = any(re.match(r"^\s*Environment:\s*$", ln) for ln in block)

                  if not has_env:
                      # find PortMappings:
                      pm = None
                      for k in range(start, end):
                          if re.match(r"^\s*PortMappings:\s*$", y[k]):
                              pm = k
                              break

                      if pm is not None:
                          pm_indent = len(re.match(r"^(\s*)", y[pm]).group(1))
                          insert_at = pm + 1
                          for k in range(pm + 1, end):
                              cur_indent = len(re.match(r"^(\s*)", y[k]).group(1))
                              if cur_indent <= pm_indent and y[k].strip():
                                  insert_at = k
                                  break
                              insert_at = k + 1

                          env_block = [
                              f"{prop_indent}Environment:",
                              f"{prop_indent}  - Name: PORT",
                              f"{prop_indent}    Value: !Ref ContainerPort",
                          ]
                          y[insert_at:insert_at] = env_block

              CFN_BACKEND.write_text("\n".join(y) + "\n", encoding="utf-8")

          print("✅ Codebreaker AutoFix applied changes in working tree.")
          PY

      - name: Create Pull Request (autofix)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Codebreaker: auto-fix backend + CFN (remove lxp-web build, set /health, inject PORT)"
          title: "Codebreaker AutoFix: backend + CFN (/health + PORT) and remove lxp-web build"
          body: |
            Auto-generated by Codebreaker AutoFix.

            Fixes applied:
            - apps/lxp-api/Dockerfile: backend-only (no apps/lxp-web build)
            - apps/lxp-api/package.json: ensures scripts.start exists (node index.js)
            - apps/lxp-api/index.js: ensured with /health endpoint + binds 0.0.0.0 + uses PORT
            - apps/lxp-api/.dockerignore: ensured
