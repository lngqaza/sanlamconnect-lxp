name: Codebreaker AutoFix (Backend + CFN) -> PR

on:
  workflow_run:
    workflows: ["Push backend image to ECR"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout (default branch)
        uses: actions/checkout@v4

      - name: Codebreaker AutoFix (backend Dockerfile/start + CFN health/PORT)
        shell: bash
        run: |
          set -euo pipefail

          BACKEND_DIR="apps/lxp-api"
          BACKEND_DOCKERFILE="${BACKEND_DIR}/Dockerfile"
          BACKEND_DOCKERIGNORE="${BACKEND_DIR}/.dockerignore"
          BACKEND_PKG="${BACKEND_DIR}/package.json"
          BACKEND_INDEX="${BACKEND_DIR}/index.js"

          WF_BACKEND=".github/workflows/push-backend-to-ecr.yml"
          CFN_BACKEND="sanlamconnect-lxp-backend-ecs.yml"

          echo "=== Codebreaker AutoFix starting ==="
          echo "Backend dir: ${BACKEND_DIR}"

          if [ ! -d "${BACKEND_DIR}" ]; then
            echo "❌ Backend dir not found: ${BACKEND_DIR}"
            echo "Folders under apps/:"
            ls -la apps || true
            exit 1
          fi

          # --------------------------------------------------------------------
          # A) Fix backend Dockerfile so it NEVER builds apps/lxp-web
          # --------------------------------------------------------------------
          NEED_DOCKERFILE_FIX="yes"
          if [ -f "${BACKEND_DOCKERFILE}" ]; then
            if ! grep -q "apps/lxp-web" "${BACKEND_DOCKERFILE}"; then
              NEED_DOCKERFILE_FIX="no"
            fi
          fi

          if [ "${NEED_DOCKERFILE_FIX}" = "yes" ]; then
            echo "✅ Writing backend-only Dockerfile (removes lxp-web build steps)"
            cat > "${BACKEND_DOCKERFILE}" << 'EOF'
FROM node:20-alpine
WORKDIR /app

COPY package*.json ./
RUN npm install

COPY . .

ENV NODE_ENV=production
ENV PORT=3001
EXPOSE 3001

CMD ["node","index.js"]
EOF
          else
            echo "✅ Backend Dockerfile already does not reference lxp-web"
          fi

          # Ensure .dockerignore exists
          if [ ! -f "${BACKEND_DOCKERIGNORE}" ]; then
            echo "✅ Creating .dockerignore"
            cat > "${BACKEND_DOCKERIGNORE}" << 'EOF'
node_modules
.next
dist
build
coverage
.git
.github
.env
.env.*
EOF
          fi

          # --------------------------------------------------------------------
          # B) Ensure backend can start: scripts.start + index.js
          # --------------------------------------------------------------------
          if [ ! -f "${BACKEND_PKG}" ]; then
            echo "❌ Missing package.json: ${BACKEND_PKG}"
            exit 1
          fi

          # Add scripts.start if missing
          if ! grep -q '"start"' "${BACKEND_PKG}"; then
            echo "✅ Adding scripts.start to package.json"
            python - << 'PY'
import json, pathlib
p = pathlib.Path("apps/lxp-api/package.json")
data = json.loads(p.read_text(encoding="utf-8"))
scripts = data.get("scripts") or {}
scripts.setdefault("start", "node index.js")
data["scripts"] = scripts
p.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
PY
          else
            echo "✅ package.json already has scripts.start"
          fi

          # Create index.js if missing (Fastify + /health, binds 0.0.0.0, uses PORT)
          if [ ! -f "${BACKEND_INDEX}" ]; then
            echo "✅ Creating minimal Fastify index.js with /health"
            cat > "${BACKEND_INDEX}" << 'EOF'
require("dotenv").config();
const fastify = require("fastify")({ logger: true });

fastify.get("/health", async () => ({ status: "ok" }));
fastify.get("/", async () => ({ service: "lxp-api", status: "running" }));

const port = Number(process.env.PORT || 3001);
fastify.listen({ port, host: "0.0.0.0" })
  .then(() => fastify.log.info(`✅ lxp-api listening on 0.0.0.0:${port}`))
  .catch(err => { fastify.log.error(err); process.exit(1); });
EOF
          else
            echo "✅ index.js already exists"
          fi

          # --------------------------------------------------------------------
          # C) Ensure backend ECR workflow doesn't reference lxp-web
          # --------------------------------------------------------------------
          if [ -f "${WF_BACKEND}" ]; then
            if grep -q "apps/lxp-web" "${WF_BACKEND}"; then
              echo "✅ Removing lxp-web references from backend push workflow"
              sed -i 's#apps/lxp-web#apps/lxp-api#g' "${WF_BACKEND}"
            fi
          else
            echo "⚠️ ${WF_BACKEND} not found (skipping workflow fix)"
          fi

          # --------------------------------------------------------------------
          # D) CFN FIXES: /health healthcheck + PORT env var into lxp-backend container
          # --------------------------------------------------------------------
          if [ -f "${CFN_BACKEND}" ]; then
            echo "✅ Patching CFN template: ${CFN_BACKEND}"

            # 1) Force HealthCheckPath: /health if HealthCheckPath exists
            if grep -qE '^\s*HealthCheckPath:' "${CFN_BACKEND}"; then
              sed -i -E 's|^(\s*HealthCheckPath:)\s*.*$|\1 /health|' "${CFN_BACKEND}"
            else
              echo "⚠️ Could not find HealthCheckPath line to update"
            fi

            # 2) Inject PORT env var under container Name: lxp-backend if Environment is missing
            python - << 'PY'
import re
from pathlib import Path

p = Path("sanlamconnect-lxp-backend-ecs.yml")
txt = p.read_text(encoding="utf-8", errors="replace").splitlines()

# Find "- Name: lxp-backend"
start = None
for i, line in enumerate(txt):
    if re.match(r"^\s*-\s+Name:\s*lxp-backend\s*$", line):
        start = i
        break

if start is None:
    print("WARN: Could not find container '- Name: lxp-backend' to inject PORT env var.")
    p.write_text("\n".join(txt) + "\n", encoding="utf-8")
    raise SystemExit(0)

base_indent = len(re.match(r"^(\s*)", txt[start]).group(1))
prop_indent = base_indent + 2

# Determine end of this container block
end = len(txt)
for j in range(start + 1, len(txt)):
    if re.match(r"^\s*-\s+Name:\s*", txt[j]) and len(re.match(r"^(\s*)", txt[j]).group(1)) == base_indent:
        end = j
        break

block = txt[start:end]
if any(re.match(r"^\s*Environment:\s*$", ln) for ln in block):
    print("OK: Environment already present for lxp-backend, skipping PORT injection.")
    p.write_text("\n".join(txt) + "\n", encoding="utf-8")
    raise SystemExit(0)

# Find PortMappings line for insertion point
pm = None
for k in range(start, end):
    if re.match(r"^\s*PortMappings:\s*$", txt[k]):
        pm = k
        break

if pm is None:
    print("WARN: Could not find PortMappings under lxp-backend, skipping PORT injection.")
    p.write_text("\n".join(txt) + "\n", encoding="utf-8")
    raise SystemExit(0)

pm_indent = len(re.match(r"^(\s*)", txt[pm]).group(1))
insert_at = pm + 1
for k in range(pm + 1, end):
    cur_indent = len(re.match(r"^(\s*)", txt[k]).group(1))
    if cur_indent <= pm_indent and txt[k].strip():
        insert_at = k
        break
    insert_at = k + 1

env_block = [
    " " * prop_indent + "Environment:",
    " " * (prop_indent + 2) + "- Name: PORT",
    " " * (prop_indent + 4) + "Value: !Ref ContainerPort",
]

txt[insert_at:insert_at] = env_block
p.write_text("\n".join(txt) + "\n", encoding="utf-8")
print("OK: Inserted PORT env var into lxp-backend container.")
PY
          else
            echo "⚠️ ${CFN_BACKEND} not found (skipping CFN fix)"
          fi

          echo "=== Codebreaker AutoFix done ==="

      - name: Create Pull Request (autofix)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Codebreaker: auto-fix backend + CFN (remove lxp-web build, set /health, inject PORT)"
          title: "Codebreaker AutoFix: backend + CFN (/health + PORT) and remove lxp-web build"
          body: |
            Auto-generated by Codebreaker AutoFix.

            Fixes applied:
            - apps/lxp-api/Dockerfile: backend-only (no apps/lxp-web build)
            - apps/lxp-api/package.json: ensures scripts.start exists (node index.js)
            - apps/lxp-api/index.js: ensured with /health endpoint + binds 0.0.0.0 + uses PORT
            - apps/lxp-api/.dockerignore: ensured
            - .github/workflows/push-backend-to-ecr.yml: removes accidental lxp-web references if present
            - sanlamconnect-lxp-backend-ecs.yml:
              - HealthCheckPath forced to /health
              - Injects env var PORT = !Ref ContainerPort into lxp-backend container (if missing)

            After merge:
            1) Re-run "Push backend image to ECR"
            2) Force new ECS deployment (because :latest)
            3) Update CloudFormation stack using patched template if required
          branch: "codebreaker/autofix-backend-cfn"
          delete-branch: true