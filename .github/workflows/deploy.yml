name: Deploy to AWS

on:
  push:
    branches:
      - "main"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 684756697968
  BACKEND_ECR_REPO: sanlamconnect-lxp-backend
  FRONTEND_ECR_REPO: sanlamconnect-lxp-frontend
  BACKEND_STACK: sanlamconnect-lxp-backend
  FRONTEND_STACK: sanlamconnect-lxp-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Ensure ECR repos exist ──────────────────────────────────────────────
      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in "${BACKEND_ECR_REPO}" "${FRONTEND_ECR_REPO}"; do
            aws ecr describe-repositories \
              --repository-names "$repo" \
              --region "${AWS_REGION}" >/dev/null 2>&1 \
            || aws ecr create-repository \
              --repository-name "$repo" \
              --region "${AWS_REGION}" >/dev/null
            echo "✅ ECR repo ready: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${repo}"
          done

      # ── Build & push backend ────────────────────────────────────────────────
      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPO}:latest"
          docker build -t "${IMAGE_URI}" apps/lxp-api
          docker push "${IMAGE_URI}"
          echo "BACKEND_IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "✅ Backend pushed: ${IMAGE_URI}"

      # ── Build & push frontend ───────────────────────────────────────────────
      - name: Build and push frontend image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_ECR_REPO}:latest"
          docker build -f apps/lxp-web/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "FRONTEND_IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "✅ Frontend pushed: ${IMAGE_URI}"

      # ── Deploy backend stack (includes RDS + Secrets Manager) ───────────────
      - name: Deploy backend stack
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --template-file sanlamconnect-lxp-backend-ecs.yml \
            --stack-name "${BACKEND_STACK}" \
            --parameter-overrides \
              ImageUri="${BACKEND_IMAGE_URI}" \
              DBMasterPassword="${{ secrets.DB_PASSWORD }}" \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
          echo "✅ Backend stack deployed"

      # ── Get backend URL to wire frontend ────────────────────────────────────
      - name: Get backend URL
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${BACKEND_STACK}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='BackendUrl'].OutputValue" \
            --output text)
          echo "BACKEND_URL=${BACKEND_URL}" >> "$GITHUB_ENV"
          echo "Backend URL: ${BACKEND_URL}"

      # ── Deploy frontend stack ────────────────────────────────────────────────
      - name: Deploy frontend stack
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --template-file sanlamconnect-lxp-ecs.yml \
            --stack-name "${FRONTEND_STACK}" \
            --parameter-overrides \
              ImageUri="${FRONTEND_IMAGE_URI}" \
              ApiUrl="${BACKEND_URL}" \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
          echo "✅ Frontend stack deployed"

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Print deployment URLs
        shell: bash
        run: |
          set -euo pipefail
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${FRONTEND_STACK}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo ""
          echo "===== Deployment complete ====="
          echo "  Backend:  ${BACKEND_URL}"
          echo "  Frontend: ${FRONTEND_URL}"
          echo "==============================="
