name: Deploy to AWS (Manual Only)

on:
  workflow_dispatch:
    inputs:
      deploy-backend:
        description: "Deploy backend (apps/lxp-api)"
        required: true
        default: "true"
      deploy-frontend:
        description: "Deploy frontend (apps/lxp-web)"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 684756697968

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================================
      # BACKEND DEPLOY
      # =========================================================
      - name: Build & push BACKEND (apps/lxp-api)
        if: ${{ inputs.deploy-backend == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          REPO="sanlamconnect-lxp-backend"
          TAG="latest"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:${TAG}"

          echo "Building BACKEND image from apps/lxp-api"
          docker build -f apps/lxp-api/Dockerfile -t "${IMAGE_URI}" apps/lxp-api
          docker push "${IMAGE_URI}"

          echo "✅ Backend pushed: ${IMAGE_URI}"

      # =========================================================
      # FRONTEND DEPLOY (ONLY IF YOU EXPLICITLY ENABLE IT)
      # =========================================================
      - name: Build & push FRONTEND (apps/lxp-web)
        if: ${{ inputs.deploy-frontend == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          REPO="sanlamconnect-lxp-web"
          TAG="latest"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:${TAG}"

          echo "Building FRONTEND image from apps/lxp-web"
          docker build -f apps/lxp-web/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

          echo "✅ Frontend pushed: ${IMAGE_URI}"

      - name: Done
        run: echo "✅ Deploy workflow completed"