name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "apps/lxp-web/**"
      - "packages/**"
      - "sanlamconnect-lxp-ecs.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 684756697968
  ECR_REPO: sanlamconnect-lxp-frontend
  STACK_NAME: sanlamconnect-lxp-frontend
  BACKEND_STACK: sanlamconnect-lxp-backend

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories \
            --repository-names "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null
          echo "ECR repo ready: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

      - name: Build and push frontend image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest"
          # Build context is monorepo root so packages/ is accessible
          docker build -f apps/lxp-web/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "Frontend pushed: ${IMAGE_URI}"

      - name: Get backend URL from existing stack
        shell: bash
        run: |
          set -euo pipefail
          BACKEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${BACKEND_STACK}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='BackendUrl'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -z "${BACKEND_URL}" ]; then
            echo "WARNING: Backend stack not found or has no BackendUrl output. API_URL will be empty."
            BACKEND_URL=""
          fi
          echo "BACKEND_URL=${BACKEND_URL}" >> "$GITHUB_ENV"
          echo "Backend URL: ${BACKEND_URL}"

      - name: Deploy frontend CloudFormation stack
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --template-file sanlamconnect-lxp-ecs.yml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              ImageUri="${IMAGE_URI}" \
              ApiUrl="${BACKEND_URL}" \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
          echo "Frontend stack deployed"

      - name: Print frontend URL
        shell: bash
        run: |
          set -euo pipefail
          URL=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo ""
          echo "============================="
          echo "  Frontend: ${URL}"
          echo "============================="
