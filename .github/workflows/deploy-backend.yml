name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "apps/lxp-api/**"
      - "packages/**"
      - "sanlamconnect-lxp-backend-ecs.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 684756697968
  ECR_REPO: sanlamconnect-lxp-backend
  STACK_NAME: sanlamconnect-lxp-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories \
            --repository-names "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null
          echo "ECR repo ready: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest"
          docker build -t "${IMAGE_URI}" apps/lxp-api
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "Backend pushed: ${IMAGE_URI}"

      - name: Deploy backend CloudFormation stack
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --template-file sanlamconnect-lxp-backend-ecs.yml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              ImageUri="${IMAGE_URI}" \
              DBMasterPassword="${{ secrets.DB_PASSWORD }}" \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
          echo "Backend stack deployed"

      - name: Print backend URL
        shell: bash
        run: |
          set -euo pipefail
          URL=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='BackendUrl'].OutputValue" \
            --output text)
          echo ""
          echo "============================="
          echo "  Backend: ${URL}"
          echo "============================="
