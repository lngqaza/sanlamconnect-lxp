name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "apps/lxp-api/**"
      - "packages/**"
      - "sanlamconnect-lxp-backend-ecs.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 684756697968
  ECR_REPO: sanlamconnect-lxp-backend
  STACK_NAME: sanlamconnect-lxp-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories \
            --repository-names "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null
          echo "ECR repo ready: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::8}"
          BASE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          IMAGE_URI="${BASE}:${SHA}"
          docker build -t "${IMAGE_URI}" -t "${BASE}:latest" apps/lxp-api
          docker push "${BASE}:${SHA}"
          docker push "${BASE}:latest"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "Backend pushed: ${IMAGE_URI}"

      - name: Clear stuck CloudFormation stack if needed
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: ${STATUS}"
          if [[ "${STATUS}" == *"ROLLBACK_COMPLETE"* || "${STATUS}" == *"FAILED"* || "${STATUS}" == *"UPDATE_ROLLBACK_COMPLETE"* ]]; then
            echo "Stack is in ${STATUS} — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
            aws cloudformation wait stack-delete-complete --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
            echo "Stack deleted successfully"
          fi

      - name: Deploy backend CloudFormation stack
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --template-file sanlamconnect-lxp-backend-ecs.yml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              ImageUri="${IMAGE_URI}" \
              DBMasterPassword="${{ secrets.DB_PASSWORD }}" \
              ExistingVpcId="vpc-0a11971bde54ee0ae" \
              ExistingSubnetAId="subnet-047b137ed150a6c63" \
              ExistingAlbSgId="sg-0a0fae2494c37d4b4" \
              ExistingServiceSgId="sg-0d576d74ee5512ac4" \
              ExistingDBSgId="sg-067b99bf5fad9f4e5" \
              DBEndpoint="sanlamconnect-lxp-db.c3ey4ccwqez2.eu-west-1.rds.amazonaws.com" \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset
          echo "Backend stack deployed"

      - name: Force ECS redeployment
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${STACK_NAME}" \
            --service "${STACK_NAME}" \
            --force-new-deployment \
            --region "${AWS_REGION}" > /dev/null
          echo "ECS service redeployment triggered"

      - name: Print backend URL
        shell: bash
        run: |
          set -euo pipefail
          URL=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='BackendUrl'].OutputValue" \
            --output text)
          echo ""
          echo "============================="
          echo "  Backend: ${URL}"
          echo "============================="
