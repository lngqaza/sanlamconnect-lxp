name: Push backend image to ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-1
      AWS_ACCOUNT_ID: 684756697968
      ECR_REPO: sanlamconnect-lxp-backend
      IMAGE_TAG: latest
      BACKEND_DIR: apps/lxp-api
      BACKEND_PORT: "3001"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # STEP 2 (the key fix): assume the correct role via OIDC
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "${ECR_REPO}" --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository --repository-name "${ECR_REPO}" --region "${AWS_REGION}" >/dev/null
          echo "✅ ECR repo ensured: ${ECR_REPO}"

      - name: Sanity check backend folder
        shell: bash
        run: |
          set -euo pipefail
          echo "=== BACKEND DIR ==="
          if [ ! -d "${BACKEND_DIR}" ]; then
            echo "❌ BACKEND_DIR '${BACKEND_DIR}' does not exist."
            echo "Folders under ./apps:"
            ls -la ./apps || true
            exit 1
          fi
          ls -la "${BACKEND_DIR}" | head -n 200

      - name: Ensure Dockerfile exists (auto-generate if missing)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${BACKEND_DIR}/Dockerfile" ]; then
            echo "✅ Dockerfile exists at ${BACKEND_DIR}/Dockerfile"
            exit 0
          fi

          echo "⚠️ No Dockerfile found. Auto-generating minimal Node backend Dockerfile..."

          cat > "${BACKEND_DIR}/Dockerfile" << EOF
          FROM node:20-alpine
          WORKDIR /app

          COPY package*.json ./
          COPY pnpm-lock.yaml* yarn.lock* npm-shrinkwrap.json* ./

          RUN if [ -f pnpm-lock.yaml ]; then corepack enable && pnpm i --frozen-lockfile; \
              elif [ -f yarn.lock ]; then corepack enable && yarn install --frozen-lockfile; \
              elif [ -f package-lock.json ]; then npm ci; \
              else npm install; fi

          COPY . .
          RUN npm run -s build || true

          ENV NODE_ENV=production
          ENV PORT=${BACKEND_PORT}
          EXPOSE ${BACKEND_PORT}

          CMD npm run -s start || node dist/server.js || node server.js || node src/server.js
          EOF

          cat > "${BACKEND_DIR}/.dockerignore" << 'EOF'
          node_modules
          .next
          dist
          build
          coverage
          .git
          .github
          .env
          .env.*
          EOF

          echo "✅ Generated Dockerfile and .dockerignore in ${BACKEND_DIR}"

      - name: Build and push backend image
        shell: bash
        run: |
          set -euo pipefail

          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_URI}/${ECR_REPO}:${IMAGE_TAG}"

          echo "Building image: ${IMAGE_URI}"
          echo "Using build context: ${BACKEND_DIR}"

          docker build -t "${ECR_REPO}:${IMAGE_TAG}" "${BACKEND_DIR}"
          docker tag "${ECR_REPO}:${IMAGE_TAG}" "${IMAGE_URI}"
          docker push "${IMAGE_URI}"

          echo "✅ Pushed: ${IMAGE_URI}"