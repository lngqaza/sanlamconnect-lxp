name: Push backend image to ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-1
      AWS_ACCOUNT_ID: 684756697968
      ECR_REPO: sanlamconnect-lxp-backend
      IMAGE_TAG: latest
      BACKEND_DIR: apps/lxp-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684756697968:role/github-actions-ecr-push
          aws-region: eu-west-1
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories \
            --repository-names "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${ECR_REPO}" \
            --region "${AWS_REGION}" >/dev/null

      - name: Build and push backend image (apps/lxp-api)
        shell: bash
        run: |
          set -euo pipefail
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_URI}/${ECR_REPO}:${IMAGE_TAG}"

          echo "Building backend from ${BACKEND_DIR}"
          docker build -f "${BACKEND_DIR}/Dockerfile" -t "${ECR_REPO}:${IMAGE_TAG}" "${BACKEND_DIR}"
          docker tag "${ECR_REPO}:${IMAGE_TAG}" "${IMAGE_URI}"
          docker push "${IMAGE_URI}"

          echo "✅ Pushed: ${IMAGE_URI}"