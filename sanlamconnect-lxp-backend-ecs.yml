AWSTemplateFormatVersion: '2010-09-09'
Description: SanlamConnect LXP Backend - ECS Fargate + ALB (reuses existing VPC and RDS)

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI for the LXP backend

  DBMasterPassword:
    Type: String
    NoEcho: true
    Description: Master password for the existing PostgreSQL database

  # Existing resources — passed in by the workflow, never recreated
  ExistingVpcId:
    Type: String
    Default: vpc-0a11971bde54ee0ae

  ExistingSubnetAId:
    Type: String
    Default: subnet-047b137ed150a6c63

  ExistingAlbSgId:
    Type: String
    Default: sg-0a0fae2494c37d4b4

  ExistingServiceSgId:
    Type: String
    Default: sg-0d576d74ee5512ac4

  ExistingDBSgId:
    Type: String
    Default: sg-067b99bf5fad9f4e5

  DBEndpoint:
    Type: String
    Default: sanlamconnect-lxp-db.c3ey4ccwqez2.eu-west-1.rds.amazonaws.com

  ContainerPort:
    Type: Number
    Default: 3001

  DesiredCount:
    Type: Number
    Default: 1

  Cpu:
    Type: String
    Default: '512'
    AllowedValues: ['256','512','1024','2048','4096']

  Memory:
    Type: String
    Default: '1024'
    AllowedValues: ['512','1024','2048','3072','4096','6144','8192','10240','12288','16384','30720']

Resources:
  # -------------------------
  # Networking — only what's missing
  # -------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: sanlamconnect-lxp-backend-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ExistingVpcId
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ExistingVpcId

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ExistingSubnetAId
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ExistingVpcId
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.91.2.0/24
      MapPublicIpOnLaunch: true

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # -------------------------
  # Secrets Manager - DATABASE_URL
  # -------------------------
  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /sanlamconnect-lxp/backend/database-url
      Description: PostgreSQL connection string for lxp-api
      SecretString: !Sub
        - "postgresql://lxpadmin:${DBMasterPassword}@${DBEndpoint}:5432/lxpdb"
        - DBEndpoint: !Ref DBEndpoint

  # -------------------------
  # CloudWatch Logs
  # -------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/sanlamconnect-lxp-backend
      RetentionInDays: 7

  # -------------------------
  # ECS Cluster + IAM
  # -------------------------
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: sanlamconnect-lxp-backend

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadDatabaseUrlSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseUrlSecret

  # -------------------------
  # Task Definition
  # -------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: sanlamconnect-lxp-backend
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: lxp-backend
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # -------------------------
  # ALB
  # -------------------------
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: VpcGatewayAttachment
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups: [!Ref ExistingAlbSgId]
      Subnets: [!Ref ExistingSubnetAId, !Ref PublicSubnetB]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref ExistingVpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /health
      Matcher:
        HttpCode: 200-399

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # -------------------------
  # ECS Service
  # -------------------------
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: sanlamconnect-lxp-backend
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref TaskDefinition
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [!Ref ExistingSubnetAId, !Ref PublicSubnetB]
          SecurityGroups: [!Ref ExistingServiceSgId]
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: lxp-backend
          ContainerPort: !Ref ContainerPort

Outputs:
  BackendUrl:
    Description: Public URL for the LXP backend (HTTP)
    Value: !Sub "http://${LoadBalancer.DNSName}"

  DatabaseSecretArn:
    Description: ARN of the DATABASE_URL secret in Secrets Manager
    Value: !Ref DatabaseUrlSecret
